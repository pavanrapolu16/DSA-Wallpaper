name: Build Android APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Restore Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Reconstituting debug.keystore from base64 representation..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found. Gradle will generate a default key if missing."
          fi

      - name: Create fallback local.properties or mock .env
        run: |
          # Create a mock .env file if it does not exist (needed for secrets plugin configuration)
          if [ ! -f ".env" ]; then
            if [ -f ".env.example" ]; then
              cp .env.example .env
            else
              touch .env
            fi
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dsa-wallpaper-app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
